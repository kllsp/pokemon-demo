<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>포켓몬 캐치 스테이션 | 宝可梦捕捉站</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, "Noto Sans KR", "Microsoft YaHei", sans-serif;
      background: radial-gradient(circle at top, #dbeafe 0%, #e2e8f0 35%, #cbd5e1 100%);
      color: #0f172a;
    }
    .page {
      max-width: 470px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 20px 16px;
    }
    .phone {
      background: linear-gradient(to bottom, #fff8e7, #ffffff, #eef6ff);
      border-radius: 36px;
      overflow: hidden;
      box-shadow: 0 30px 80px rgba(15,23,42,0.2);
      min-height: calc(100vh - 40px);
    }
    .header {
      padding: 20px 24px;
      background: rgba(255,255,255,0.88);
      border-bottom: 1px solid rgba(255,255,255,0.7);
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(8px);
    }
    .header small {
      display: block;
      color: #94a3b8;
      font-weight: 700;
      letter-spacing: .2em;
      text-transform: uppercase;
      margin-bottom: 6px;
      font-size: 11px;
    }
    .header h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.15;
    }
    .back-btn {
      border: none;
      background: #0f172a;
      color: white;
      border-radius: 16px;
      width: 44px;
      height: 44px;
      font-size: 20px;
      cursor: pointer;
    }
    .content { padding: 20px 24px 28px; }
    .hero {
      background: linear-gradient(135deg, #fef3c7, #fffbeb, #ffedd5);
      border-radius: 28px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(15,23,42,0.08);
    }
    .pill {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.92);
      font-size: 12px;
      font-weight: 700;
      color: #334155;
      margin-bottom: 12px;
    }
    .hero h2 {
      margin: 0 0 12px;
      font-size: 32px;
      line-height: 1.2;
    }
    .hero p, .desc {
      margin: 0;
      color: #475569;
      font-size: 14px;
      line-height: 1.7;
    }
    .actions, .dual-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 18px;
    }
    button {
      cursor: pointer;
      border: none;
      font-family: inherit;
    }
    .btn-dark {
      background: #0f172a;
      color: white;
      border-radius: 18px;
      padding: 14px 14px;
      font-size: 14px;
      font-weight: 700;
    }
    .btn-light {
      background: white;
      color: #0f172a;
      border-radius: 18px;
      padding: 14px 14px;
      font-size: 14px;
      font-weight: 700;
      box-shadow: 0 4px 16px rgba(15,23,42,0.08);
    }
    .section {
      background: rgba(255,255,255,0.9);
      margin-top: 18px;
      border-radius: 24px;
      padding: 16px;
      box-shadow: 0 4px 16px rgba(15,23,42,0.06);
    }
    .section-title {
      margin: 0 0 12px;
      color: #94a3b8;
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .18em;
    }
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .chip {
      padding: 10px 14px;
      border-radius: 999px;
      background: white;
      color: #334155;
      font-size: 14px;
      font-weight: 700;
      box-shadow: 0 3px 10px rgba(15,23,42,0.06);
    }
    .chip.active {
      background: #0f172a;
      color: white;
    }
    .list {
      display: grid;
      gap: 14px;
      margin-top: 18px;
    }
    .card {
      border: none;
      width: 100%;
      text-align: left;
      border-radius: 28px;
      padding: 18px;
      box-shadow: 0 10px 25px rgba(15,23,42,0.08);
    }
    .card-inner {
      display: flex;
      gap: 14px;
      align-items: center;
    }
    .art {
      width: 96px;
      height: 96px;
      flex: 0 0 96px;
      background: rgba(255,255,255,0.74);
      border-radius: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px;
      box-shadow: 0 4px 14px rgba(15,23,42,0.06);
    }
    .art img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }
    .meta {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.82);
      color: #334155;
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .card h3 {
      margin: 0;
      font-size: 26px;
      line-height: 1.2;
    }
    .card p {
      margin: 8px 0 0;
      color: #475569;
      font-size: 13px;
      line-height: 1.6;
    }
    .cta {
      margin-top: 12px;
      display: inline-block;
      padding: 10px 14px;
      border-radius: 16px;
      background: #0f172a;
      color: white;
      font-size: 14px;
      font-weight: 700;
    }
    .center-card {
      text-align: center;
      border-radius: 30px;
      padding: 24px;
      box-shadow: 0 14px 34px rgba(15,23,42,0.1);
    }
    .center-art {
      width: 210px;
      height: 210px;
      margin: 0 auto;
      background: rgba(255,255,255,0.78);
      border-radius: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 14px;
      box-shadow: 0 5px 14px rgba(15,23,42,0.08);
    }
    .center-art img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }
    .center-card h2 {
      margin: 14px 0 10px;
      font-size: 38px;
      line-height: 1.1;
    }
    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 12px;
    }
    .info-box {
      background: #f8fafc;
      border-radius: 18px;
      padding: 12px;
      color: #334155;
      font-size: 14px;
      line-height: 1.5;
    }
    .info-box b { color: #0f172a; }
    .detail-block {
      background: white;
      border-radius: 24px;
      padding: 16px;
      box-shadow: 0 4px 16px rgba(15,23,42,0.06);
      margin-top: 14px;
    }
    .detail-block p {
      margin: 10px 0 0;
      color: #475569;
      line-height: 1.8;
      font-size: 14px;
    }
    @media (max-width: 480px) {
      .page { padding: 8px; }
      .phone { min-height: calc(100vh - 16px); }
      .content { padding: 16px; }
      .hero h2 { font-size: 28px; }
      .center-card h2 { font-size: 32px; }
      .card h3 { font-size: 22px; }
    }
  </style>
</head>

      "노말":"노말 타입 포켓몬 / 一般属性宝可梦",
      "풀":"풀 타입 포켓몬 / 草属性宝可梦",
      "불":"불 타입 포켓몬 / 火属性宝可梦",
      "물":"물 타입 포켓몬 / 水属性宝可梦",
      "에스퍼":"에스퍼 타입 포켓몬 / 超能力属性宝可梦",
      "악":"악 타입 포켓몬 / 恶属性宝可梦",
      "격투":"격투 타입 포켓몬 / 格斗属性宝可梦",
      "페어리":"페어리 타입 포켓몬 / 妖精属性宝可梦"
    };

    let screen = "home";
    let selectedType = "전체";
    let selected = null;

    function filteredList() {
      return selectedType === "전체" ? POKEMON : POKEMON.filter(p => p.typeKo === selectedType);
    }

    function renderHome() {
      const types = ["전체", ...Array.from(new Set(POKEMON.map(p => p.typeKo)))];
      return `
        <div class="content">
          <div class="hero">
            <div class="pill">포켓몬 원본 아트워크 기반 데모 / 官方原版图鉴演示</div>
            <h2>친숙한 포켓몬을 탐색하고<br>宝可梦探索与信息查看</h2>
            <p>타입을 선택한 뒤 랜덤 추천을 받을 수 있고, 포켓몬의 기본 설정과 세대 정보, 특징을 확인할 수 있습니다.<br>选择属性后可以随机推荐宝可梦，并查看基础设定、世代信息和角色特点。</p>
            <div class="actions">
              <button class="btn-dark" onclick="pickRandom()">✨ 랜덤 추천 / 随机推荐</button>
              <button class="btn-light" onclick="openFirst()">★ 바로 보기 / 直接查看</button>
            </div>
          </div>

          <div class="section">
            <div class="section-title">Type Filter / 属性筛选</div>
            <div class="chips">
              ${types.map(type => `<button class="chip ${selectedType===type?'active':''}" onclick="setType('${type}')">${type}</button>`).join('')}
            </div>
            <p class="desc" style="margin-top:12px;">${TYPE_META[selectedType] || ''}</p>
          </div>

          <div class="list">
            ${filteredList().map(p => `
              <button class="card" style="background:${p.bg};" onclick="openDetail(${p.id})">
                <div class="card-inner">
                  <div class="art"><img src="${p.image}" alt="${p.ko}"></div>
                  <div style="flex:1; min-width:0;">
                    <div class="meta">${p.typeKo} 타입 · ${p.genKo}</div>
                    <h3>${p.ko} / ${p.zh}</h3>
                    <p>${p.descKo}<br>${p.descZh}</p>
                  </div>
                </div>
                <div class="cta">상세 정보 보기 / 查看详情</div>
              </button>
            `).join('')}
          </div>
        </div>
      `;
    }

    function renderRandom() {
      return `
        <div class="content" style="display:flex; flex-direction:column; justify-content:center; min-height:calc(100vh - 110px);">
          <div class="center-card" style="background:${selected.bg};">
            <div class="center-art"><img src="${selected.image}" alt="${selected.ko}"></div>
            <div class="pill" style="margin-top:16px;">Random Pick</div>
            <h2>${selected.ko} / ${selected.zh}</h2>
            <div class="meta">${selected.typeKo} 타입 · ${selected.genKo}</div>
            <p class="desc" style="margin-top:12px;">${selected.descKo}<br>${selected.descZh}</p>
          </div>
          <div class="dual-actions">
            <button class="btn-light" onclick="pickRandom()">↻ 다시 뽑기 / 重新抽取</button>
            <button class="btn-dark" onclick="screen='detail'; render()">ⓘ 상세 정보 / 详细信息</button>
          </div>
        </div>
      `;
    }

    function renderDetail() {
      return `
        <div class="content">
          <div class="center-card" style="background:${selected.bg}; text-align:left;">
            <div style="display:flex; gap:16px; align-items:center;">
              <div class="art" style="width:112px; height:112px; flex:0 0 112px;"><img src="${selected.image}" alt="${selected.ko}"></div>
              <div style="flex:1;">
                <div class="pill">도감 정보 / 图鉴信息</div>
                <h2 style="font-size:34px; margin:0 0 4px;">${selected.ko} / ${selected.zh}</h2>
                <div style="color:#475569; font-weight:700;">${selected.en}</div>
              </div>
            </div>
          </div>

          <div class="detail-block">
            <div class="section-title">Basic Info / 基本信息</div>
            <div class="info-grid">
              <div class="info-box"><b>타입 / 属性</b><br>${selected.typeKo} / ${selected.typeZh}</div>
              <div class="info-box"><b>세대 / 世代</b><br>${selected.genKo} / ${selected.genZh}</div>
              <div class="info-box"><b>분류 / 分类</b><br>${selected.categoryKo} / ${selected.categoryZh}</div>
              <div class="info-box"><b>신장·체중 / 身高·体重</b><br>${selected.height} / ${selected.weight}</div>
            </div>
          </div>

          <div class="detail-block">
            <div class="section-title">Description / 角色说明</div>
            <p>${selected.descKo}<br>${selected.descZh}</p>
          </div>
        </div>
      `;
    }

    function render() {
      document.getElementById('app').innerHTML = `
        <div class="page">
          <div class="phone">
            <div class="header">
              <div>
                <small>Information Kiosk Demo</small>
                <h1>포켓몬 캐치 스테이션 / 宝可梦捕捉站</h1>
              </div>
              ${screen !== 'home' ? '<button class="back-btn" onclick="goHome()">←</button>' : ''}
            </div>
            ${screen === 'home' ? renderHome() : screen === 'random' ? renderRandom() : renderDetail()}
          </div>
        </div>
      `;
    }

    function setType(type) { selectedType = type; render(); }
    function pickRandom() {
      const list = filteredList();
      selected = list[Math.floor(Math.random() * list.length)];
      screen = "random";
      render();
    }
    function openDetail(id) {
      selected = POKEMON.find(p => p.id === id);
      screen = "detail";
      render();
    }
    function openFirst() {
      const list = filteredList();
      selected = list[0];
      screen = "detail";
      render();
    }
    function goHome() { screen = "home"; render(); }

    render();
  </script>
</body>
</html>
